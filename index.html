<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CS++ Guessing Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <p id="date"></p>
    
    <div>
        <input type="radio" name="level" id="e" value="3" checked> Easy (1-3)
        <input type="radio" name="level" id="m" value="10"> Medium (1-10)
        <input type="radio" name="level" id="h" value="100"> Hard (1-100)
    </div>

    <button id="playBtn">Play</button>
    <hr>
    
    <h3 id="msg">Press Play to Start!</h3>
    
    <input type="number" id="guess" placeholder="Enter guess">
    <button id="guessBtn" disabled>Guess</button>
    <button id="giveUpBtn" disabled>Give Up</button>

    <hr>
    <p>Total Wins: <span id="wins">0</span></p>
    <p>Average Score: <span id="avgScore">0</span></p>
    <p>Fastest Game (ms): <span id="fastest">0</span></p>
    <p>Average Time (ms): <span id="avgTime">0</span></p>

    <h4>Leaderboard (Top 3)</h4>
    <ol>
        <li name="leaderboard">--</li>
        <li name="leaderboard">--</li>
        <li name="leaderboard">--</li>
    </ol>

    <script src="script.js"></script>
</body>
</html>
